{% extends 'base.html' %}
{% block title %}{{ 'Edit' if product else 'Add' }} Product{% endblock %}
{% block content %}
<div class="max-w-[680px] mx-auto px-6 py-10">
    <h1 class="text-[32px] font-bold tracking-tight text-apple-text mb-8">
        {{ 'Edit Product' if product else 'Add New Product' }}
    </h1>
    <form method="POST" class="space-y-5">
        <div>
            <label class="block text-[13px] font-medium text-apple-text mb-1.5">Product Name</label>
            <input type="text" name="name" value="{{ product.name if product else '' }}" required class="apple-input">
        </div>
        <div>
            <label class="block text-[13px] font-medium text-apple-text mb-1.5">Description</label>
            <textarea name="description" rows="4" required
                class="apple-input">{{ product.description if product else '' }}</textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-[13px] font-medium text-apple-text mb-1.5">Price (₹)</label>
                <input type="number" step="0.01" name="price" value="{{ product.price if product else '' }}" required
                    class="apple-input">
            </div>
            <div>
                <label class="block text-[13px] font-medium text-apple-text mb-1.5">Original Price (₹)</label>
                <input type="number" step="0.01" name="original_price"
                    value="{{ product.original_price if product and product.original_price else '' }}"
                    class="apple-input" placeholder="Optional">
            </div>
            <div>
                <label class="block text-[13px] font-medium text-apple-text mb-1.5">Category</label>
                <input type="text" name="category" value="{{ product.category if product else '' }}" required
                    class="apple-input">
            </div>
            <div>
                <label class="block text-[13px] font-medium text-apple-text mb-1.5">Stock</label>
                <input type="number" name="stock" value="{{ product.stock if product else 0 }}" required
                    class="apple-input">
            </div>
        </div>
        <div>
            <label class="block text-[13px] font-medium text-apple-text mb-1.5">Image URL</label>
            <input type="text" name="image_url" value="{{ product.image_url if product else '' }}" class="apple-input"
                placeholder="https://...">
        </div>
        <div>
            <label class="block text-[13px] font-medium text-apple-text mb-1.5">AR Model URL <span
                    class="text-apple-text-secondary">(optional)</span></label>
            <input type="text" name="ar_model" value="{{ product.ar_model if product else '' }}" class="apple-input"
                placeholder="Path to 3D model">
        </div>
        <div>
            <label class="block text-[13px] font-medium text-apple-text mb-1.5">Specifications (JSON)</label>
            <textarea name="specs" rows="3" class="apple-input font-mono text-[14px]"
                placeholder='{"Key": "Value"}'>{{ product.specs if product else '{}' }}</textarea>
        </div>
        <div class="flex gap-3 pt-4">
            <button type="submit" class="btn-primary">{{ 'Update' if product else 'Create' }} Product</button>
            <a href="{{ url_for('admin') }}" class="btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
